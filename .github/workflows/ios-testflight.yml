name: iOS TestFlight

# Archives the Capacitor iOS app with automatic signing (driven by an
# App Store Connect API key) and uploads the build to TestFlight.
#
# Manual trigger only (workflow_dispatch) or by pushing a v* tag, so an
# upload never happens by accident on an ordinary push/PR.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ASC_KEY_ID        - App Store Connect API Key ID
#   ASC_ISSUER_ID     - App Store Connect API Issuer ID (UUID)
#   ASC_KEY_P8_BASE64 - the .p8 private key, base64-encoded
#                       (macOS: base64 -i AuthKey_XXXX.p8 | pbcopy)
#
# The Apple Developer Team ID is not secret and is set below in env.
#
# Prerequisites (one-time, on Apple's side):
#   - An app record in App Store Connect for bundle id com.triclub.app
#   - The API key must have the "App Manager" role
#   - The build number is set from the CI run number, so each upload is unique

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  APPLE_TEAM_ID: '64CADALDVN'

jobs:
  testflight:
    runs-on: macos-14
    defaults:
      run:
        working-directory: src/Squad.Client

    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets are present
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          missing=
          [ -z "$ASC_KEY_ID" ] && missing="$missing ASC_KEY_ID"
          [ -z "$ASC_ISSUER_ID" ] && missing="$missing ASC_ISSUER_ID"
          [ -z "$ASC_KEY_P8_BASE64" ] && missing="$missing ASC_KEY_P8_BASE64"
          if [ -n "$missing" ]; then
            echo "::error::Missing/empty repository secret(s):$missing"
            echo "Add them as *Repository* secrets (NOT Environment secrets), exact names above, at:"
            echo "  Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          fi
          echo "All required App Store Connect secrets are present."
          # Publish whitespace-trimmed IDs for later steps. A stray space or
          # newline pasted into the secret makes xcodebuild reject the key
          # ("Invalid authentication key credential ... keyPathInvalidFormat").
          printf 'ASC_KEY_ID=%s\n'    "$(printf '%s' "$ASC_KEY_ID"    | tr -d '[:space:]')" >> "$GITHUB_ENV"
          printf 'ASC_ISSUER_ID=%s\n' "$(printf '%s' "$ASC_ISSUER_ID" | tr -d '[:space:]')" >> "$GITHUB_ENV"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/Squad.Client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Capacitor sync (iOS)
        run: npx cap sync ios

      - name: Install App Store Connect API key
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEYFILE=~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          if printf '%s' "$ASC_KEY_P8_BASE64" | grep -q "BEGIN PRIVATE KEY"; then
            # Secret already holds the raw .p8 (PEM) — write it as-is.
            printf '%s\n' "$ASC_KEY_P8_BASE64" > "$KEYFILE"
          else
            # Secret holds base64 of the .p8 — strip whitespace, then decode
            # (openssl handles both wrapped and unwrapped base64 portably).
            printf '%s' "$ASC_KEY_P8_BASE64" | tr -d '[:space:]' | openssl base64 -A -d > "$KEYFILE"
          fi
          if ! grep -q "BEGIN PRIVATE KEY" "$KEYFILE"; then
            echo "::error::ASC_KEY_P8_BASE64 did not resolve to a valid .p8 (expected a PKCS#8 'BEGIN PRIVATE KEY' block). Re-check that secret: paste EITHER the raw AuthKey_*.p8 contents OR its base64 (base64 -i AuthKey_XXX.p8)."
            exit 1
          fi
          echo "API key installed ($(wc -c < "$KEYFILE") bytes)."

      - name: Archive (Release, automatic signing)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            archive

      - name: Export .ipa
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>destination</key><string>export</string>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        run: |
          IPA=$(ls "$RUNNER_TEMP"/export/*.ipa | head -1)
          echo "Uploading $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload .ipa artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Triclub-ios-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: warn
