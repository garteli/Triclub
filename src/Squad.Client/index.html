<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- maximum-scale=1 stops iOS auto-zooming when a sub-16px input is focused — that zoom
         shrinks the visual viewport and pans the page sideways ("the width breaks when the
         keyboard opens"). Maps use MapLibre's own canvas pinch-zoom, so this doesn't affect them. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Domestique Hub — Team Training Platform</title>
    <!-- Home-page description + app name for Google's OAuth consent-screen verification (and link
         previews). Kept in the static HTML so it's visible without running the SPA's JavaScript. -->
    <meta name="description" content="Domestique Hub is a team training app for multi-sport and motorsport clubs. Train together and ride together: shared training plans, group events and rides, a live group-ride computer, leaderboards and rankings — your team's whole season in one app." />
    <meta property="og:title" content="Domestique Hub" />
    <meta property="og:site_name" content="Domestique Hub" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.domestiquehub.com/" />
    <meta property="og:description" content="A team training app for multi-sport and motorsport clubs — shared plans, group events and rides, a live group-ride computer, leaderboards and rankings. Your team's whole season in one app." />

    <!-- Earliest possible launch timestamp so the app can hold the splash for a minimum time. -->
    <script>window.__bootAt = Date.now();</script>

    <!-- Brand icons + PWA -->
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0c0e11" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Domestique Hub" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Heebo:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      html, body { background: #0c0e11; margin: 0; overflow-x: hidden; overscroll-behavior: none; }
      @keyframes bootpulse { 0%, 100% { transform: scale(1); opacity: 1 } 50% { transform: scale(.94); opacity: .82 } }
      /* The boot splash lives inside #root and is replaced the moment React mounts. */
      #boot-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        background: #0c0e11; font-family: 'Space Grotesk', system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash">
        <div style="width:96px;height:96px;border-radius:26px;background:linear-gradient(155deg,#ff8a3d,#ef5f1f);display:flex;align-items:center;justify-content:center;box-shadow:0 20px 54px -12px rgba(239,95,31,.6);animation:bootpulse 1.6s ease-in-out infinite">
          <svg width="58" height="58" viewBox="0 0 64 64" fill="none">
            <g stroke="#fff" stroke-width="5.4" stroke-linecap="round">
              <path d="M13 44 L23 30" /><path d="M25 46 L35 32" opacity=".85" /><path d="M37 48 L47 34" opacity=".55" />
            </g>
            <circle cx="49.5" cy="20.5" r="4.4" fill="#fff" />
          </svg>
        </div>
        <div style="font-size:22px;font-weight:700;letter-spacing:-.4px;color:#eef2f6">Domestique<span style="color:#ff6a2c"> Hub</span></div>
        <div style="font-size:13px;line-height:1.5;color:#98a2ae;max-width:300px;text-align:center;padding:0 20px">
          A team training app for multi-sport &amp; motorsport clubs — shared training plans, group events and rides,
          a live group-ride computer, and club leaderboards. Your team's whole season, in one app.
        </div>
        <!-- Static links so the no-JS home page is a complete landing page for Google's OAuth
             consent-screen review (a privacy-policy link reachable from the home page is expected). -->
        <div style="font-size:12px;color:#6b7480">
          <a href="/privacy.html" style="color:#98a2ae;text-decoration:none">Privacy Policy</a>
          <span style="padding:0 8px;color:#3a424c">·</span>
          <a href="/support.html" style="color:#98a2ae;text-decoration:none">Support</a>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
